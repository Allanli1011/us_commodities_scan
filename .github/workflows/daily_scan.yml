name: Daily Futures Scan

# Runs after US futures cash-session close. CME E-mini settles ~21:00 UTC;
# pick 23:00 UTC so Yahoo Finance has the day's bar fully updated. Cron is
# always UTC on GitHub.
on:
  schedule:
    - cron: "0 23 * * 1-5"   # Mon–Fri 23:00 UTC
  workflow_dispatch:          # manual trigger from the Actions tab

permissions:
  contents: write             # required to commit signals/ back to the repo

concurrency:
  group: daily-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scan
        run: |
          python scripts/scan_full.py \
            --refresh-data \
            --min-score 1.0 \
            --plot-top 5

      - name: Stage signals into committed folder
        run: |
          mkdir -p signals/charts
          shopt -s nullglob
          csvs=(output/futures_signals_*.csv)
          pngs=(output/charts/*.png)
          if (( ${#csvs[@]} )); then cp "${csvs[@]}" signals/; fi
          if (( ${#pngs[@]} )); then cp "${pngs[@]}" signals/charts/; fi
          echo "── signals/ contents ──"
          ls -la signals/ signals/charts/ 2>/dev/null || true

      - name: Upload artifacts (90-day retention)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-${{ github.run_id }}
          path: |
            output/
            signals/
          if-no-files-found: warn
          retention-days: 90

      - name: Commit signals back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add signals/
          if git diff --cached --quiet; then
            echo "No new signal files — skipping commit"
            exit 0
          fi
          git commit -m "chore: daily futures signals $(date -u +%F) [skip ci]"
          git push
